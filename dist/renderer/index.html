<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyrene</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      user-select: none;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #live2d-canvas {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    /* Placeholder for chat UI module (stage 4) */
    #chat-container {
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="live2d-canvas"></canvas>
    <div id="chat-container"></div>
  </div>
</body>
</html>
